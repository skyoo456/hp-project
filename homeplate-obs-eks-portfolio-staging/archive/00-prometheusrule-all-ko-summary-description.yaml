# Source: hp-observability-rules/templates/layer7_ux.yaml
# =============================================================================
# Layer 7 - UX
# Targets: Faro RUM (hp-frontend Web Vitals / user experience)
# Metrics: faro_receiver_* (Alloy Collector faro.receiver)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-ux-rules
  namespace: observability
  labels:
    release: kps
    layer: ux
spec:
  groups:

    # =========================================================================
    # GROUP 1. Faro Receiver status
    # =========================================================================
    - name: ux.faro
      rules:

        - alert: FaroReceiverStalled
          expr: |
            (
              sum(increase(faro_receiver_events_total[30m])) > 30
            )
            and
            (
              sum(increase(faro_receiver_events_total[5m])) == 0
            )
          for: 3m
          labels:
            severity: warning
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro Receiver 정체"
            description: "최근 30분 동안 Faro RUM 이벤트가 유입되다가 최근 5분 동안 수신이 끊겼습니다. Alloy Collector, ingress 경로, 프론트엔드 RUM SDK 전송을 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: FaroExceptionRateHighWarning
          expr: |
            (
              sum(rate(faro_receiver_exceptions_total[5m]))
              /
              clamp_min(sum(rate(faro_receiver_events_total[5m])), 0.001)
            ) > 0.05
            and
            sum(rate(faro_receiver_events_total[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro 예외 비율 경고: {{ $value | humanizePercentage }}"
            description: "RUM 트래픽이 있는 상태에서 프론트엔드 JavaScript 예외 비율이 높습니다. 사용자 측 오류가 증가하고 있을 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: FaroExceptionRateHighCritical
          expr: |
            (
              sum(rate(faro_receiver_exceptions_total[5m]))
              /
              clamp_min(sum(rate(faro_receiver_events_total[5m])), 0.001)
            ) > 0.1
            and
            sum(rate(faro_receiver_events_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro 예외 비율 심각: {{ $value | humanizePercentage }}"
            description: "RUM 트래픽이 있는 상태에서 프론트엔드 JavaScript 예외 비율이 매우 높습니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
