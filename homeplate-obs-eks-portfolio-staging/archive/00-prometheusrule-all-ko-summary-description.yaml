            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendCoreHighErrorRateWarning
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-core",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
                destination_service_name="hp-backend-core",
                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-core
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-core 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "hp-backend-core 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendCoreHighErrorRateCritical
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-core",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
