# Source: hp-observability-rules/templates/layer3_delivery.yaml
# =============================================================================
# Layer 3 - Delivery
# targets: Jenkins, SonarQube, ArgoCD (server/app-controller/repo-server/appset-controller)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-delivery-rules
  namespace: observability
  labels:
    release: kps
    layer: delivery
spec:
  groups:

    # =========================================================================
    # GROUP 1. Jenkins
    # =========================================================================
    - name: delivery.jenkins
      rules:

        - alert: JenkinsDown
          expr: up{job="jenkins"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins 다운"
            description: "Jenkins 가 응답하지 않습니다. CI 파이프라인 실행에 영향이 있을 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: JenkinsBuildQueueHighWarning
          expr: |
            jenkins_queue_size_value > 10
          for: 10m
          labels:
            severity: warning
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins 빌드 큐 높음: {{ $value }}"
            description: "Jenkins 빌드 대기열이 {{ $value }} 건입니다. 경고 기준은 10건입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: JenkinsBuildQueueHighCritical
          expr: |
            jenkins_queue_size_value > 30
          for: 5m
          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins 빌드 큐 심각: {{ $value }}"
            description: "Jenkins 빌드 대기열이 {{ $value }} 건입니다. executor 부족 여부를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: JenkinsExecutorSaturationWarning
          expr: |
            (
              jenkins_executor_in_use_value
              / clamp_min(jenkins_executor_count_value, 1)
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Executor 포화 경고: {{ $value | humanizePercentage }}"
            description: "Jenkins executor 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: JenkinsExecutorSaturationCritical
          expr: |
            (
              jenkins_executor_in_use_value
              / clamp_min(jenkins_executor_count_value, 1)
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Executor 포화 심각: {{ $value | humanizePercentage }}"
            description: "Jenkins executor 사용률이 매우 높습니다. 빌드가 대기 상태로 밀릴 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2. SonarQube
    # =========================================================================
    - name: delivery.sonarqube
      rules:

        - alert: SonarQubeDown
          expr: up{job="sonarqube"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: sonarqube
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "SonarQube 다운"
            description: "SonarQube 가 응답하지 않습니다. 코드 품질 분석에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: SonarQubeComputeEnginePending
          expr: |
            sonarqube_compute_engine_pending_tasks_total > 0
          for: 15m
          labels:
            severity: warning
            layer: delivery
            component: sonarqube
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "SonarQube CE 대기 작업 수: {{ $value }}"
            description: "SonarQube Compute Engine 에 대기 작업이 {{ $value }} 건 있습니다. 15분 이상 지속 중입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3. ArgoCD
    # =========================================================================
    - name: delivery.argocd
      rules:

        - alert: ArgoCDServerDown
          expr: up{job="argocd-server-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: argocd-server
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD Server 다운"
            description: "ArgoCD Server 가 응답하지 않습니다. UI 와 API 사용에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDAppControllerDown
          expr: up{job="argocd-application-controller-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: argocd-application-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD Application Controller 다운"
            description: "ArgoCD Application Controller 가 응답하지 않습니다. 애플리케이션 동기화에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDRepoServerDown
          expr: up{job="argocd-repo-server-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: argocd-repo-server
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD Repo Server 다운"
            description: "ArgoCD Repo Server 가 응답하지 않습니다. Git 저장소 조회에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDAppSetControllerDown
          expr: up{job="argocd-applicationset-controller-metrics"} == 0
          for: 1m
          labels:
            severity: warning
            layer: delivery
            component: argocd-applicationset-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD ApplicationSet Controller 다운"
            description: "ArgoCD ApplicationSet Controller 가 응답하지 않습니다. ApplicationSet 동기화에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDAppNotSyncedWarning
          expr: |
            count(
              argocd_app_info{sync_status!="Synced"}
            ) > 1
          for: 10m
          labels:
            severity: warning
            layer: delivery
            component: argocd-application-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD 앱 미동기화: {{ $value }}"
            description: "Synced 상태가 아닌 ArgoCD 애플리케이션이 {{ $value }} 개 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDAppNotSyncedCritical
          expr: |
            count(
              argocd_app_info{sync_status!="Synced"}
            ) > 3
          for: 5m
          labels:
            severity: critical
            layer: delivery
            component: argocd-application-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD 앱 미동기화 심각: {{ $value }}"
            description: "Synced 상태가 아닌 ArgoCD 애플리케이션이 {{ $value }} 개 있습니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDAppDegraded
          expr: |
            count(
              argocd_app_info{health_status="Degraded"}
            ) > 0
          for: 3m
          labels:
            severity: critical
            layer: delivery
            component: argocd-application-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD 앱 상태 저하: {{ $value }}"
