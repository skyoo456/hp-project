            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ArgoCDClusterDisconnected
          expr: argocd_cluster_connection_status == 0
          for: 3m
          labels:
            severity: critical
            layer: delivery
            component: argocd-application-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ArgoCD 클러스터 연결 끊김: {{ $labels.server }}"
