            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-queue CrashLoopBackOff: {{ $labels.pod }}"
            description: "hp-backend-queue 파드 {{ $labels.pod }} 가 CrashLoopBackOff 상태입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendQueueHighErrorRateWarning
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-queue",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
                destination_service_name="hp-backend-queue",
                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-queue
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-queue 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "hp-backend-queue 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendQueueHighErrorRateCritical
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-queue",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
                destination_service_name="hp-backend-queue",
                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: application
            component: hp-backend-queue
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-queue 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "hp-backend-queue 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendQueueHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  destination_service_name="hp-backend-queue",
                  destination_service_namespace="hp-core"
                }[5m])
              )
            ) / 1000 > 1
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-queue
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-queue p99 지연시간 경고: {{ $value | humanizeDuration }}"
            description: "hp-backend-queue 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendQueueHighLatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  destination_service_name="hp-backend-queue",
                  destination_service_namespace="hp-core"
                }[5m])
              )
            ) / 1000 > 3
          for: 3m
          labels:
            severity: critical
            layer: application
            component: hp-backend-queue
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-queue p99 지연시간 심각: {{ $value | humanizeDuration }}"
            description: "hp-backend-queue 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2-B. hp-backend-worker
    # =========================================================================
    - name: application.hp_backend_worker
      rules:

        - alert: HpBackendWorkerNotReady
          expr: |
            (
              kube_deployment_spec_replicas{
                namespace="hp-core",
                deployment="hp-backend-worker"
              }
              != kube_deployment_status_replicas_available{
                namespace="hp-core",
                deployment="hp-backend-worker"
              }
            )
          for: 1m
          labels:
            severity: critical
            layer: application
            component: hp-backend-worker
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-worker Ready 아님"
            description: "hp-backend-worker 의 가용 replicas 수가 원하는 replicas 수와 일치하지 않습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendWorkerPodCrashLoop
          expr: |
            max by (pod, container) (
              kube_pod_container_status_waiting_reason{
                namespace="hp-core",
                reason="CrashLoopBackOff"
              }
              * on(namespace, pod) group_left(label_app)
              kube_pod_labels{
                label_app="hp-backend-worker"
              }
            ) == 1
          for: 1m
          labels:
            severity: critical
            layer: application
            component: hp-backend-worker
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-worker CrashLoopBackOff: {{ $labels.pod }}"
            description: "hp-backend-worker 파드 {{ $labels.pod }} 가 CrashLoopBackOff 상태입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3. hp-workers - metrics , enabled: true
    # =========================================================================

    # =========================================================================
    # GROUP 4. aiops-backend
    # =========================================================================
    - name: application.aiops_backend
      rules:

        - alert: AiopsBackendNotReady
          expr: |
            (
              kube_deployment_spec_replicas{
                namespace="aiops",
                deployment="aiops-backend"
              }
              != kube_deployment_status_replicas_available{
                namespace="aiops",
                deployment="aiops-backend"
              }
            )
          for: 1m
          labels:
            severity: critical
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend Ready 아님"
            description: "aiops-backend 의 가용 replicas 수가 원하는 replicas 수와 일치하지 않습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsBackendPodCrashLoop
          expr: |
            max by (pod, container) (
              kube_pod_container_status_waiting_reason{
                namespace="aiops",
                reason="CrashLoopBackOff"
              }
              * on(namespace, pod) group_left(label_app)
              kube_pod_labels{
                label_app="aiops-backend"
              }
            ) == 1
          for: 1m
          labels:
            severity: critical
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend CrashLoopBackOff: {{ $labels.pod }}"
            description: "aiops-backend 파드 {{ $labels.pod }} 가 CrashLoopBackOff 상태입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsBackendHighErrorRateWarning
          expr: |
            (
              sum(rate(aiops_requests_total{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(aiops_requests_total[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "aiops-backend 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsBackendHighErrorRateCritical
          expr: |
            (
              sum(rate(aiops_requests_total{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(aiops_requests_total[5m])), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "aiops-backend 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsBackendHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(aiops_request_duration_seconds_bucket[5m])
              )
            ) > 1
          for: 5m
          labels:
            severity: warning
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend p99 지연시간 경고: {{ $value | humanizeDuration }}"
            description: "aiops-backend 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsBackendHighLatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(aiops_request_duration_seconds_bucket[5m])
              )
            ) > 3
          for: 3m
          labels:
            severity: critical
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend p99 지연시간 심각: {{ $value | humanizeDuration }}"
            description: "aiops-backend 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AiopsDbPoolExhausted
          expr: |
            (
             rate(aiops_requests_total[5m]) > 0
            )
            and
            (
            aiops_db_pool_free == 0
            )
          for: 3m
          labels:
            severity: critical
            layer: application
            component: aiops-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "aiops-backend DB 풀 고갈"
            description: "aiops-backend 의 DB 커넥션 풀이 고갈되었습니다. DB 대기 또는 요청 실패가 발생할 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
