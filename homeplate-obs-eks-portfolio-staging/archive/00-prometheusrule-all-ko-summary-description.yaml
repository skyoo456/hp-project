                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: application
            component: hp-backend-core
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-core 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "hp-backend-core 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendCoreHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  destination_service_name="hp-backend-core",
                  destination_service_namespace="hp-core"
                }[5m])
              )
            ) / 1000 > 1
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-core
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-core p99 지연시간 경고: {{ $value | humanizeDuration }}"
            description: "hp-backend-core 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
