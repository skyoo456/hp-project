            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
    - name: application.hp_backend_queue
      rules:

        - alert: HpBackendQueueNotReady
          expr: |
            sum(kube_pod_status_ready{namespace="hp-core",condition="true",pod=~"hp-backend-queue-.*"}) < 1
          for: 5m
