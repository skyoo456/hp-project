---
# Source: hp-observability-rules/templates/layer1_infrastructure.yaml
# =============================================================================
# Layer 1 - Infrastructure
# targets: apiserver, kubelet, coredns, node-exporter, kube-state-metrics, PVC/PV
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-infrastructure-rules
  namespace: observability
  labels:
    release: kps
    layer: infrastructure
spec:
  groups:

    # =========================================================================
    # GROUP 1. Node status
    # =========================================================================
    - name: infrastructure.node
      rules:

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 Ready 아님: {{ $labels.node }}"
            description: "노드 {{ $labels.node }} 가 Ready 상태가 아닙니다. 해당 노드의 상태와 그 위에서 동작 중인 파드를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: NodeCpuHighWarning
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              )
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 CPU 경고: {{ $labels.instance }}"
            description: "노드 {{ $labels.instance }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 경고 기준은 80%입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: NodeCpuHighCritical
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              )
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 CPU 심각: {{ $labels.instance }}"
            description: "노드 {{ $labels.instance }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: NodeMemoryHighWarning
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes
                / node_memory_MemTotal_bytes
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 메모리 경고: {{ $labels.instance }}"
            description: "노드 {{ $labels.instance }} 의 메모리 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: NodeMemoryHighCritical
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes
                / node_memory_MemTotal_bytes
              )
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 메모리 심각: {{ $labels.instance }}"
            description: "노드 {{ $labels.instance }} 의 메모리 사용률이 {{ $value | humanizePercentage }} 입니다. OOM 발생 가능성을 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        # [FIX] fstype  + mountpoint
        - alert: NodeDiskHighWarning
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
                / node_filesystem_size_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
              )
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 디스크 경고: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "노드 {{ $labels.instance }} 의 {{ $labels.mountpoint }} 마운트 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: NodeDiskHighCritical
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
                / node_filesystem_size_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
              )
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "노드 디스크 심각: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "노드 {{ $labels.instance }} 의 {{ $labels.mountpoint }} 마운트 사용률이 {{ $value | humanizePercentage }} 입니다. 디스크 부족 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2.   /
    # =========================================================================
    - name: infrastructure.controlplane
      rules:

        # [FIX] node  instance  (kubelet scrape  )
        - alert: KubeletDown
          expr: up{job="kubelet"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kubelet 다운: {{ $labels.instance }}"
            description: "kubelet {{ $labels.instance }} 가 응답하지 않습니다. 해당 노드와 파드 상태를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: ApiserverDown
          expr: up{job="apiserver"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: apiserver
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "API Server 다운"
            description: "Kubernetes API Server 가 응답하지 않습니다. kubectl, ArgoCD, 컨트롤러 동작에 영향이 있을 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: CoreDNSDown
          expr: up{job="coredns"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: coredns
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "CoreDNS 다운"
            description: "CoreDNS 가 응답하지 않습니다. 클러스터 내부 DNS 해석에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        # observability  job Layer 4 PrometheusTargetDown
        - alert: ScrapeTargetDown
          expr: |
            up{job!~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
          for: 3m
          labels:
            severity: warning
            layer: infrastructure
            component: scrape-target
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "스크레이프 타깃 다운: {{ $labels.job }}/{{ $labels.instance }}"
            description: "Prometheus 가 {{ $labels.job }} / {{ $labels.instance }} 대상 스크레이프에 실패했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3. Pod / Workload status
    # =========================================================================
    - name: infrastructure.workload
      rules:

        - alert: PodNotReady
          expr: |
            max by (namespace, pod) (
              kube_pod_status_ready{condition="true"} == 0
            )
            * on (namespace, pod) group_left()
            (kube_pod_status_phase{phase="Running"} == 1)
          for: 1m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "파드 Ready 아님: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "{{ $labels.namespace }}/{{ $labels.pod }} 파드가 Running 상태이지만 Ready 가 아닙니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PodCrashLoopBackOff
          expr: |
            max by (namespace, pod, container) (
              kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}
            ) == 1
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "{{ $labels.namespace }}/{{ $labels.pod }} 의 {{ $labels.container }} 컨테이너가 CrashLoopBackOff 상태입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        # [FIX] spec_replicas   -
        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas
            != kube_deployment_status_replicas_available
          for: 5m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Deployment 레플리카 불일치: {{ $labels.namespace }}/{{ $labels.deployment }}"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} 의 가용 replicas 수가 원하는 replicas 수와 일치하지 않습니다. 현재 값: {{ $value }}"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 4. PVC / PV
    # =========================================================================
    - name: infrastructure.storage
      rules:

        # [FIX] component: kubelet - kubelet_volume_stats_* metrics
        - alert: PvcUsedHighWarning
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC 사용량 경고: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PvcUsedHighCritical
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC 사용량 심각: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} 사용률이 {{ $value | humanizePercentage }} 입니다. 용량 부족 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PvcPredictedFull
          expr: |
            predict_linear(kubelet_volume_stats_available_bytes[6h], 24 * 3600) < 0
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC 가득 참 예측: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} 는 현재 증가 추세라면 24시간 이내에 가득 찰 것으로 예측됩니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PvNotBound
          expr: kube_persistentvolume_status_phase{phase!="Bound"} == 1
          for: 5m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PV 바인딩 안 됨: {{ $labels.persistentvolume }}"
            description: "PersistentVolume {{ $labels.persistentvolume }} 이 Bound 상태가 아닙니다. 현재 상태: {{ $labels.phase }}"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
---
# Source: hp-observability-rules/templates/layer2_platform.yaml
# =============================================================================
# Layer 2 - Platform
# targets: ALB(YACE), istio-ingress, istiod, aws-load-balancer-controller, yace
#       keycloak: exporter not deployed  enabled: false
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-platform-rules
  namespace: observability
  labels:
    release: kps
    layer: platform
spec:
  groups:

    # =========================================================================
    # GROUP 1. AWS Load Balancer Controller
    # =========================================================================
    - name: platform.lbc
      rules:

        - alert: AwsLoadBalancerControllerDown
          expr: up{job="aws-load-balancer-controller-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: aws-load-balancer-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "AWS Load Balancer Controller 다운"
            description: "AWS Load Balancer Controller 가 응답하지 않습니다. Ingress 및 ALB 반영에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2. ALB (YACE - aws_applicationelb_* metrics)
    # =========================================================================
    - name: platform.alb
      rules:

        - alert: AlbHigh5xxRateWarning
          expr: |
            (
              rate(aws_applicationelb_httpcode_target_5_xx_count_sum[5m])
              /
              clamp_min(rate(aws_applicationelb_request_count_sum[5m]), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 5xx 비율 경고: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 의 5xx 비율이 {{ $value | humanizePercentage }} 입니다. 경고 기준은 1%입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlbHigh5xxRateCritical
          expr: |
            (
              rate(aws_applicationelb_httpcode_target_5_xx_count_sum[5m])
              /
              clamp_min(rate(aws_applicationelb_request_count_sum[5m]), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 5xx 비율 심각: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 의 5xx 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
        
        - alert: AlbElb5xxRateWarning
          expr: |
            (
              rate(aws_applicationelb_httpcode_elb_5_xx_count_sum[5m])
              /
              clamp_min(rate(aws_applicationelb_request_count_sum[5m]), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops 
          annotations:
            summary: "ALB ELB 5xx 비율 높음"
            description: "ALB 자체 계층의 5xx 비율이 1%를 초과했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlbHighLatencyWarning
          expr: |
            aws_applicationelb_target_response_time_p95 > 1
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 지연시간 경고: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 의 p95 응답시간이 {{ $value | humanizeDuration }} 입니다. 경고 기준은 1초입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlbHighLatencyCritical
          expr: |
            aws_applicationelb_target_response_time_p95 > 3
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 지연시간 심각: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 의 p95 응답시간이 {{ $value | humanizeDuration }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3. Istio Ingress Gateway
    # =========================================================================
    - name: platform.istio_ingress
      rules:

        - alert: IstioIngressDown
          expr: up{job="istio-ingress-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Istio Ingress Gateway 다운"
            description: "Istio Ingress Gateway 가 응답하지 않습니다. 외부 트래픽 유입에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: IngressHigh5xxRateWarning
          expr: |
            (
              sum(rate(istio_requests_total{
                source_workload="istio-ingressgateway",
                source_workload_namespace="istio-system",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(
                sum(rate(istio_requests_total{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])),
                0.001
              )
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress 5xx 비율 경고"
            description: "Istio IngressGateway 의 5xx 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: IngressHigh5xxRateCritical
          expr: |
            (
              sum(rate(istio_requests_total{
                source_workload="istio-ingressgateway",
                source_workload_namespace="istio-system",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(
                sum(rate(istio_requests_total{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])),
                0.001
              )
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress 5xx 비율 심각"
            description: "Istio IngressGateway 의 5xx 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: IngressHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])
              )
            ) / 1000 > 1
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress p99 지연시간 경고"
            description: "Istio IngressGateway 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: IngressHighLatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])
              )
            ) / 1000 > 3
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress p99 지연시간 심각"
            description: "Istio IngressGateway 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 4. Istiod (Control Plane)
    # =========================================================================
    - name: platform.istiod
      rules:

        - alert: IstiodDown
          expr: up{job="istiod"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: istiod
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Istiod 다운"
            description: "Istiod(Istio Control Plane) 가 응답하지 않습니다. 사이드카 및 라우팅 제어에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 5. YACE (CloudWatch Exporter)
    # =========================================================================
    - name: platform.yace
      rules:

        # YACE down = RDS/ALB/ElastiCache CloudWatch metrics    critical
        - alert: YaceDown
          expr: up{job="yace-prometheus-yet-another-cloudwatch-exporter"} == 0
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: yace
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "YACE(CloudWatch Exporter) 다운"
            description: "YACE 가 응답하지 않습니다. RDS, ALB, ElastiCache CloudWatch 메트릭 수집에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 6. Keycloak - exporter not deployed,   enabled: true
    # =========================================================================
