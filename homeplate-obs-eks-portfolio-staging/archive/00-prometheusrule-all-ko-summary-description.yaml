# Source: hp-observability-rules/templates/layer4_observability.yaml
# =============================================================================
# Layer 4 - Observability
# targets: Prometheus, Alertmanager, Grafana,
#       Loki (write/read/backend/gateway),
#       Tempo (distributor/ingester/querier/query-frontend/compactor),
#       Alloy collector, Alloy logs
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-observability-rules
  namespace: observability
  labels:
    release: kps
    layer: observability
spec:
  groups:

    # =========================================================================
    # GROUP 1. Prometheus
    # =========================================================================
    - name: observability.prometheus
      rules:

        - alert: PrometheusDown
          expr: up{job="kps-prometheus"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Prometheus 다운"
            description: "Prometheus 가 응답하지 않습니다. 메트릭 수집과 룰 평가에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        # ScrapeTargetDown(Layer1)  : observability  job
        - alert: PrometheusTargetDownWarning
          expr: |
            count(
              up{job=~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
            ) > 1
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Observability 타깃 다운 경고: {{ $value }}"
            description: "Observability 영역에서 스크레이프 실패 대상이 {{ $value }} 개 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PrometheusTargetDownCritical
          expr: |
            count(
              up{job=~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
            ) > 5
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Observability 타깃 다운 심각: {{ $value }}"
            description: "Observability 영역에서 스크레이프 실패 대상이 {{ $value }} 개 있습니다. 장애 범위를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PrometheusConfigReloadFailed
          expr: prometheus_config_last_reload_successful == 0
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Prometheus 설정 리로드 실패"
            description: "Prometheus 설정 리로드에 실패했습니다. 최근 설정 변경을 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2. Alertmanager
    # =========================================================================
    - name: observability.alertmanager
      rules:

        - alert: AlertmanagerDown
          expr: up{job="kps-alertmanager"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: alertmanager
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alertmanager 다운"
            description: "Alertmanager 가 응답하지 않습니다. Slack 등 알림 전송에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlertmanagerConfigReloadFailed
          expr: alertmanager_config_last_reload_successful == 0
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: alertmanager
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alertmanager 설정 리로드 실패"
            description: "Alertmanager 설정 리로드에 실패했습니다. 최근 설정 변경을 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3. Grafana
    # =========================================================================
    - name: observability.grafana
      rules:

        - alert: GrafanaDown
          expr: up{job="kps-grafana"} == 0
          for: 1m
          labels:
            severity: warning
            layer: observability
            component: grafana
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Grafana 다운"
            description: "Grafana 가 응답하지 않습니다. 대시보드 조회가 불가능할 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 4. Loki
    # =========================================================================
    - name: observability.loki
      rules:

        - alert: LokiWriteDown
          expr: up{job="observability/loki-write"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Write 다운"
            description: "Loki Write 컴포넌트가 응답하지 않습니다. 로그 수집 및 적재에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: LokiReadDown
          expr: up{job="observability/loki-read"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-read
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Read 다운"
            description: "Loki Read 컴포넌트가 응답하지 않습니다. Grafana 에서 로그 조회가 어려울 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: LokiBackendDown
          expr: up{job="observability/loki-backend"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-backend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Backend 다운"
            description: "Loki Backend(Ruler/Compactor) 가 응답하지 않습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        # LokiGatewayDown  - job  (loki-canary/chunks-cache/results-cache  )

        - alert: LokiHighErrorRateWarning
          expr: |
            (
              sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(loki_request_duration_seconds_count[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "Loki 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: LokiHighErrorRateCritical
          expr: |
            (
              sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(loki_request_duration_seconds_count[5m])), 0.001)
            ) > 0.1
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "Loki 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 5. Tempo
    # =========================================================================
    - name: observability.tempo
      rules:

        - alert: TempoDistributorDown
          expr: up{job="observability/distributor"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Distributor 다운"
            description: "Tempo Distributor 가 응답하지 않습니다. 트레이스 수집에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoIngesterDown
          expr: up{job="observability/ingester"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-ingester
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Ingester 다운"
            description: "Tempo Ingester 가 응답하지 않습니다. 트레이스 저장에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoQuerierDown
          expr: up{job="observability/querier"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-querier
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Querier 다운"
            description: "Tempo Querier 가 응답하지 않습니다. Grafana 에서 트레이스 조회가 어려울 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoQueryFrontendDown
          expr: up{job="observability/query-frontend"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-query-frontend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Query Frontend 다운"
            description: "Tempo Query Frontend 가 응답하지 않습니다. 트레이스 조회 성능에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoCompactorDown
          expr: up{job="observability/compactor"} == 0
          for: 3m
          labels:
            severity: warning
            layer: observability
            component: tempo-compactor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Compactor 다운"
            description: "Tempo Compactor 가 응답하지 않습니다. 블록 정리 및 보존 주기에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoHighErrorRateWarning
          expr: |
            (
              sum(rate(tempo_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(tempo_request_duration_seconds_count[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "Tempo 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: TempoHighErrorRateCritical
          expr: |
            (
              sum(rate(tempo_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(tempo_request_duration_seconds_count[5m])), 0.001)
            ) > 0.1
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "Tempo 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 6. Alloy
    # =========================================================================
    - name: observability.alloy
      rules:

        - alert: AlloyCollectorDown
          expr: up{job="alloy-collector"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: alloy-collector
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alloy Collector 다운"
            description: "Alloy Collector 가 응답하지 않습니다. RUM 및 OTLP 수집에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlloyLogsDown
          expr: up{job="alloy-logs"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: alloy-logs
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alloy Logs 다운: {{ $labels.instance }}"
            description: "Alloy Logs DaemonSet {{ $labels.instance }} 가 응답하지 않습니다. 해당 노드의 로그 수집 상태를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: AlloyConfigLoadFailed
          expr: alloy_config_last_load_successful == 0
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: alloy-collector
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alloy 설정 로드 실패: {{ $labels.instance }}"
            description: "Alloy {{ $labels.instance }} 설정 로드에 실패했습니다. 최근 설정 변경을 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
---
# Source: hp-observability-rules/templates/layer5_data.yaml
# =============================================================================
# Layer 5 - Data
# targets: RDS MariaDB (mysqld-exporter), ElastiCache Redis (redis-exporter),
#       RDS CloudWatch (YACE: aws_rds_*)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-data-rules
  namespace: observability
  labels:
    release: kps
    layer: data
spec:
  groups:

    # =========================================================================
    # GROUP 1. mysqld-exporter status
    # =========================================================================
    - name: data.mysqld_exporter
      rules:

        - alert: MysqldExporterDown
          expr: up{job=~"mysqld-exporter.*"} == 0
          for: 1m
          labels:
            severity: critical
            layer: data
            component: mysqld-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "mysqld-exporter 다운: {{ $labels.job }}"
            description: "{{ $labels.job }} mysqld-exporter 가 응답하지 않습니다. MariaDB 메트릭 수집에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 2. MariaDB (mysqld-exporter metrics)
    # =========================================================================
    - name: data.mariadb
      rules:

        - alert: MariaDBConnectionHighWarning
          expr: |
            (
              mysql_global_status_threads_connected
              / mysql_global_variables_max_connections
            ) > 0.7
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 연결 수 높음 경고: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 연결 사용률이 {{ $value | humanizePercentage }} 입니다. max_connections 대비 70%를 초과했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: MariaDBConnectionHighCritical
          expr: |
            (
              mysql_global_status_threads_connected
              / mysql_global_variables_max_connections
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 연결 수 높음 심각: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 연결 사용률이 {{ $value | humanizePercentage }} 입니다. 연결 포화 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: MariaDBReplicaIOStopped
          expr: |
            mysql_slave_status_replica_io_running == 0
          for: 1m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 복제 IO 스레드 중지: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 Replica IO Thread 가 중지되었습니다. 마스터 binlog 수신 여부를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: MariaDBReplicaSQLStopped
          expr: |
            mysql_slave_status_replica_sql_running == 0
          for: 1m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 복제 SQL 스레드 중지: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 Replica SQL Thread 가 중지되었습니다. 복제 적용 상태를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: MariaDBReplicaLagWarning
          expr: |
            mysql_slave_status_seconds_behind_source
            > 10
          for: 5m
          labels:
            severity: warning
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 복제 지연 경고: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 Replica Lag 가 {{ $value }} 초입니다. 경고 기준은 10초입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: MariaDBReplicaLagCritical
          expr: |
            mysql_slave_status_seconds_behind_source
            > 30
          for: 3m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MariaDB 복제 지연 심각: {{ $labels.instance }}"
            description: "{{ $labels.instance }} 의 Replica Lag 가 {{ $value }} 초입니다. 복제 지연 원인을 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3-A. RDS CloudWatch - MariaDB (hp-rds-master, hp-rds-replica)
    # =========================================================================
    - name: data.rds_mariadb
      rules:

        - alert: RdsMariaDBCpuHighWarning
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier=~"hp-rds-master|hp-rds-replica"
            } / 100
            > 0.8
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS MariaDB CPU 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsMariaDBCpuHighCritical
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier=~"hp-rds-master|hp-rds-replica"
            } / 100
            > 0.9
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS MariaDB CPU 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsMariaDBFreeStorageLowWarning
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier=~"hp-rds-master|hp-rds-replica"
            } < 5.36870912e+09
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS MariaDB 여유 스토리지 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsMariaDBFreeStorageLowCritical
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier=~"hp-rds-master|hp-rds-replica"
            } < 1.073741824e+09
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-mariadb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS MariaDB 여유 스토리지 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다. 용량 부족 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3-B. RDS CloudWatch - aiops PostgreSQL (aiops-postgres)
    # =========================================================================
    - name: data.rds_postgresql_aiops
      rules:

        - alert: RdsAiopsPostgreSQLCpuHighWarning
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier="aiops-postgres"
            } / 100
            > 0.8
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql-aiops
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS aiops-postgres CPU 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsAiopsPostgreSQLCpuHighCritical
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier="aiops-postgres"
            } / 100
            > 0.9
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql-aiops
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS aiops-postgres CPU 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsAiopsPostgreSQLFreeStorageLowWarning
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier="aiops-postgres"
            } < 5.36870912e+09
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql-aiops
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS aiops-postgres 여유 스토리지 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsAiopsPostgreSQLFreeStorageLowCritical
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier="aiops-postgres"
            } < 1.073741824e+09
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql-aiops
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS aiops-postgres 여유 스토리지 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다. 용량 부족 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 3-C. RDS CloudWatch - Keycloak PostgreSQL (keycloak-db-prod)
    # =========================================================================
    - name: data.rds_postgresql_keycloak
      rules:

        - alert: RdsKeycloakPostgreSQLCpuHighWarning
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier="keycloak-db-prod"
            } / 100
            > 0.8
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql-keycloak
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS keycloak-db-prod CPU 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsKeycloakPostgreSQLCpuHighCritical
          expr: |
            aws_rds_cpuutilization_average{
              dimension_DBInstanceIdentifier="keycloak-db-prod"
            } / 100
            > 0.9
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql-keycloak
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS keycloak-db-prod CPU 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 CPU 사용률이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsKeycloakPostgreSQLFreeStorageLowWarning
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier="keycloak-db-prod"
            } < 5.36870912e+09
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql-keycloak
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS keycloak-db-prod 여유 스토리지 경고: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RdsKeycloakPostgreSQLFreeStorageLowCritical
          expr: |
            aws_rds_free_storage_space_minimum{
              dimension_DBInstanceIdentifier="keycloak-db-prod"
            } < 1.073741824e+09
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql-keycloak
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "RDS keycloak-db-prod 여유 스토리지 심각: {{ $labels.dimension_DBInstanceIdentifier }}"
            description: "RDS {{ $labels.dimension_DBInstanceIdentifier }} 의 남은 스토리지가 {{ $value | humanize1024 }}B 입니다. 용량 부족 여부를 즉시 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 4. redis-exporter status
    # =========================================================================
    - name: data.redis_exporter
      rules:

        - alert: RedisExporterDown
          expr: up{job="redis-exporter"} == 0
          for: 1m
          labels:
            severity: critical
            layer: data
            component: redis-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Redis Exporter 다운"
            description: "redis-exporter 가 응답하지 않습니다. ElastiCache Redis 메트릭 수집에 문제가 생길 수 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 5. ElastiCache Redis (redis-exporter + YACE)
    # =========================================================================
    - name: data.redis
      rules:

        - alert: RedisMemoryHighWarning
          expr: |
            (
              redis_memory_used_bytes
              / redis_memory_max_bytes
            ) > 0.75
          for: 10m
          labels:
            severity: warning
            layer: data
            component: elasticache-redis
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Redis 메모리 경고: {{ $labels.instance }}"
            description: "Redis {{ $labels.instance }} 의 메모리 사용률이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RedisMemoryHighCritical
          expr: |
            (
              redis_memory_used_bytes
              / redis_memory_max_bytes
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: data
            component: elasticache-redis
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Redis 메모리 심각: {{ $labels.instance }}"
            description: "Redis {{ $labels.instance }} 의 메모리 사용률이 {{ $value | humanizePercentage }} 입니다. OOM 또는 eviction 여부를 확인하세요."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: RedisLowHitRatio
          expr: |
            (
              rate(redis_keyspace_hits_total[5m])
              /
              clamp_min(
                rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]),
                0.001
              )
            ) < 0.4
          for: 15m
          labels:
            severity: warning
            layer: data
            component: elasticache-redis
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Redis 히트 비율 낮음: {{ $labels.instance }}"
            description: "Redis {{ $labels.instance }} 의 hit ratio 가 {{ $value | humanizePercentage }} 입니다. 기준은 40%입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 6. MongoDB - exporter deployed, enabled: true
    # =========================================================================
    - name: data.mongodb
      rules:

        - alert: MongoDBDown
          expr: mongodb_up == 0
          for: 1m
          labels:
            severity: critical
            layer: data
            component: mongodb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "MongoDB 다운: {{ $labels.instance }}"
            description: "MongoDB 가 응답하지 않습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 7. Kafka/Strimzi - exporter deployed, enabled: true
    # =========================================================================
    - name: data.kafka
      rules:

        - alert: KafkaBrokerTargetDown
          expr: |
            absent(up{job="observability/kafka-broker"})
            or
            min by (job) (up{job="observability/kafka-broker"}) == 0
          for: 2m
          labels:
            severity: critical
            layer: data
            component: kafka-broker
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kafka broker 타깃 다운"
            description: "Kafka broker 스크레이프 대상이 없거나 메트릭 수집에 실패했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: KafkaControllerTargetDown
          expr: |
            absent(up{job="observability/kafka-controller"})
            or
            min by (job) (up{job="observability/kafka-controller"}) == 0
          for: 2m
          labels:
            severity: critical
            layer: data
            component: kafka-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kafka controller 타깃 다운"
            description: "Kafka controller 스크레이프 대상이 없거나 메트릭 수집에 실패했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: KafkaNetworkProcessorIdleLowWarning
          expr: |
            min by (instance) (
              kafka_network_socketserver_networkprocessoravgidlepercent
            ) < 0.30
          for: 10m
          labels:
            severity: warning
            layer: data
            component: kafka
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kafka network processor idle 낮음"
            description: "Kafka {{ $labels.instance }} 의 network processor idle 비율이 30% 미만입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: KafkaNetworkProcessorIdleLowCritical
          expr: |
            min by (instance) (
              kafka_network_socketserver_networkprocessoravgidlepercent
            ) < 0.10
          for: 5m
          labels:
            severity: critical
            layer: data
            component: kafka
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kafka network processor idle 심각"
            description: "Kafka {{ $labels.instance }} 의 network processor idle 비율이 10% 미만입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: KafkaDelayedOperationsHigh
          expr: |
            sum by (instance) (
              kafka_server_delayedoperationpurgatory_numdelayedoperations_delayedoperation_fetch
              +
              kafka_server_delayedoperationpurgatory_numdelayedoperations_delayedoperation_produce
            ) > 100
          for: 10m
          labels:
            severity: warning
            layer: data
            component: kafka
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kafka 지연 작업 수 높음"
            description: "Kafka {{ $labels.instance }} 의 delayed operations 수가 100을 초과했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

    # =========================================================================
    # GROUP 8. PostgreSQL
    # =========================================================================
    - name: data.postgresql
      rules:

        - alert: PostgreSQLDown
          expr: |
            pg_up == 0
          for: 2m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PostgreSQL 다운: {{ $labels.instance }}"
            description: "PostgreSQL exporter 가 데이터베이스에 연결하지 못하고 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PostgreSQLExporterScrapeError
          expr: |
            pg_exporter_last_scrape_error > 0
          for: 5m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PostgreSQL exporter 스크레이프 에러: {{ $labels.instance }}"
            description: "postgres_exporter 스크레이프에 실패하고 있습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PostgreSQLConnectionsHigh
          expr: |
            (
              sum by (instance) (pg_stat_activity_count)
              /
              max by (instance) (pg_settings_max_connections)
            ) > 0.80
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PostgreSQL 연결 수 높음: {{ $labels.instance }}"
            description: "PostgreSQL 연결 사용률이 80%를 초과했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PostgreSQLConnectionsCritical
          expr: |
            (
              sum by (instance) (pg_stat_activity_count)
              /
              max by (instance) (pg_settings_max_connections)
            ) > 0.90
          for: 5m
          labels:
            severity: critical
            layer: data
            component: rds-postgresql
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PostgreSQL 연결 수 심각: {{ $labels.instance }}"
            description: "PostgreSQL 연결 사용률이 90%를 초과했습니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: PostgreSQLLongTransaction
          expr: |
            max by (instance) (pg_stat_activity_max_tx_duration) > 300
          for: 10m
          labels:
            severity: warning
            layer: data
            component: rds-postgresql
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PostgreSQL 장기 트랜잭션: {{ $labels.instance }}"
            description: "PostgreSQL 에서 300초를 초과한 장기 트랜잭션이 존재합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
