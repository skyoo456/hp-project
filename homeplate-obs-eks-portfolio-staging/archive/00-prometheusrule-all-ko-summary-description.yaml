# Source: hp-observability-rules/templates/layer6_application.yaml
# =============================================================================
# Layer 6 - Application
# targets: hp-frontend, hp-backend, hp-workers(not deployed), aiops-backend
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-application-rules
  namespace: observability
  labels:
    release: kps
    layer: application
spec:
  groups:

    # =========================================================================
    # GROUP 1. hp-frontend
    # =========================================================================

    # =========================================================================
    # GROUP 2. hp-backend-* (core / booking / queue / worker)
    # =========================================================================
    - name: application.hp_backend_booking
      rules:

        - alert: HpBackendBookingNotReady
          expr: |
            sum(kube_pod_status_ready{namespace="hp-core",condition="true",pod=~"hp-backend-booking-.*"}) < 1
          for: 5m
          labels:
            severity: critical
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking 준비된 파드 없음"
            description: "hp-backend-booking 의 Ready 파드 수가 0입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendBookingPodCrashLoop
          expr: |
            max by (pod, container) (
              kube_pod_container_status_waiting_reason{
                namespace="hp-core",
                reason="CrashLoopBackOff"
              }
              * on(namespace, pod) group_left(label_app)
              kube_pod_labels{
                label_app="hp-backend-booking"
              }
            ) == 1
          for: 1m
          labels:
            severity: critical
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking CrashLoopBackOff: {{ $labels.pod }}"
            description: "hp-backend-booking 파드 {{ $labels.pod }} 가 CrashLoopBackOff 상태입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendBookingHighErrorRateWarning
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-booking",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
                destination_service_name="hp-backend-booking",
                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking 에러 비율 경고: {{ $value | humanizePercentage }}"
            description: "hp-backend-booking 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendBookingHighErrorRateCritical
          expr: |
            (
              sum(rate(istio_requests_total{
                destination_service_name="hp-backend-booking",
                destination_service_namespace="hp-core",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(sum(rate(istio_requests_total{
                destination_service_name="hp-backend-booking",
                destination_service_namespace="hp-core"
              }[5m])), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking 에러 비율 심각: {{ $value | humanizePercentage }}"
            description: "hp-backend-booking 의 5xx 에러 비율이 {{ $value | humanizePercentage }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendBookingHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  destination_service_name="hp-backend-booking",
                  destination_service_namespace="hp-core"
                }[5m])
              )
            ) / 1000 > 1
          for: 5m
          labels:
            severity: warning
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking p99 지연시간 경고: {{ $value | humanizeDuration }}"
            description: "hp-backend-booking 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site

        - alert: HpBackendBookingHighLatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  destination_service_name="hp-backend-booking",
                  destination_service_namespace="hp-core"
                }[5m])
              )
            ) / 1000 > 3
          for: 3m
          labels:
            severity: critical
            layer: application
            component: hp-backend-booking
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "hp-backend-booking p99 지연시간 심각: {{ $value | humanizeDuration }}"
            description: "hp-backend-booking 의 p99 지연시간이 {{ $value | humanizeDuration }} 입니다. 즉시 확인이 필요합니다."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.site
