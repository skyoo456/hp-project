apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: aiops
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_URI
              value: "<aiops-rds-endpoint>:5432/aiops?sslmode=require"
            - name: DATA_SOURCE_USER
              value: "aiops_app"
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: aiops-backend-secret
                  key: DB_PASSWORD
          ports:
            - name: http
              containerPort: 9187
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: aiops
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app: postgres-exporter
  ports:
    - name: http
      port: 9187
      targetPort: 9187
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: aiops
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - aiops
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: http
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
