apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alloy-collector
  namespace: observability
  labels:
    release: kps
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: alloy-collector
      app.kubernetes.io/name: alloy
  namespaceSelector:
    matchNames:
      - observability
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 60s