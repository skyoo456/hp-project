apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-frontend
  template:
    metadata:
      labels:
        app: aiops-frontend
    spec:
      nodeSelector:
        nodepool: obs
      tolerations:
        - key: dedicated
          operator: Equal
          value: obs
          effect: NoSchedule
      containers:
        - name: aiops-frontend
          image: <aws-account-id>.dkr.ecr.ap-northeast-2.amazonaws.com/aiops-frontend:20260310-apifix2
          ports:
            - containerPort: 3000
          env:
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-frontend-auth
                  key: AUTH_SECRET
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: KEYCLOAK_ISSUER
              value: "https://auth.homeplate.site/realms/homeplate"
            - name: KEYCLOAK_CLIENT_ID
              value: "aiops-web"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-frontend-auth
                  key: KEYCLOAK_CLIENT_SECRET
            - name: NEXTAUTH_URL
              value: "https://aiops.homeplate.site"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-frontend
  namespace: aiops
spec:
  selector:
    app: aiops-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
