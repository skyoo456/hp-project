apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-backend
  template:
    metadata:
      labels:
        app: aiops-backend
    spec:
      nodeSelector:
        nodepool: obs
      tolerations:
        - key: dedicated
          operator: Equal
          value: obs
          effect: NoSchedule
      serviceAccountName: aiops-backend
      containers:
        - name: aiops-backend
          image: <aws-account-id>.dkr.ecr.ap-northeast-2.amazonaws.com/aiops-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aiops-backend-config
            - secretRef:
                name: aiops-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend
  namespace: aiops
  labels:
    app: aiops-backend
spec:
  selector:
    app: aiops-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
