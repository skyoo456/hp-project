            (
              sum(rate(tempo_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(tempo_request_duration_seconds_count[5m])), 0.001)
            ) > 0.1
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Error Rate Critical: {{ $value | humanizePercentage }}"
            description: "Tempo  error rate {{ $value | humanizePercentage }}.    ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
