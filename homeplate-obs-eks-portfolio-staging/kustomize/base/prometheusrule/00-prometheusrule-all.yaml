          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Build Queue Critical: {{ $value }}"
            description: "Jenkins   {{ $value }}  . executor     ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
