---
# Source: hp-observability-rules/templates/layer1_infrastructure.yaml
# =============================================================================
# Layer 1 - Infrastructure
# targets: apiserver, kubelet, coredns, node-exporter, kube-state-metrics, PVC/PV
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-infrastructure-rules
  namespace: observability
  labels:
    release: kps
    layer: infrastructure
spec:
  groups:

    # =========================================================================
    # GROUP 1. Node status
    # =========================================================================
    - name: infrastructure.node
      rules:

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node NotReady: {{ $labels.node }}"
            description: "node {{ $labels.node }} NotReady status.  node pod   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: NodeCpuHighWarning
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              )
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node CPU Warning: {{ $labels.instance }}"
            description: "node {{ $labels.instance }} CPU usage {{ $value | humanizePercentage }}. threshold: 80%"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: NodeCpuHighCritical
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              )
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node CPU Critical: {{ $labels.instance }}"
            description: "node {{ $labels.instance }} CPU usage {{ $value | humanizePercentage }}. Immediate action required."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: NodeMemoryHighWarning
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes
                / node_memory_MemTotal_bytes
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node Memory Warning: {{ $labels.instance }}"
            description: "node {{ $labels.instance }}  usage {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: NodeMemoryHighCritical
          expr: |
            (
              1 - (
                node_memory_MemAvailable_bytes
                / node_memory_MemTotal_bytes
              )
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node Memory Critical: {{ $labels.instance }}"
            description: "node {{ $labels.instance }}  usage {{ $value | humanizePercentage }}. OOM ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        # [FIX] fstype  + mountpoint
        - alert: NodeDiskHighWarning
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
                / node_filesystem_size_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
              )
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node Disk Warning: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "node {{ $labels.instance }} ({{ $labels.mountpoint }}) usage {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: NodeDiskHighCritical
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
                / node_filesystem_size_bytes{
                  fstype!~"tmpfs|overlay|squashfs|fuse.*",
                  mountpoint!~"/boot.*|/run.*|/dev.*"
                }
              )
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: node-exporter
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Node Disk Critical: {{ $labels.instance }} {{ $labels.mountpoint }}"
            description: "node {{ $labels.instance }} ({{ $labels.mountpoint }}) usage {{ $value | humanizePercentage }}.   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 2.   /
    # =========================================================================
    - name: infrastructure.controlplane
      rules:

        # [FIX] node  instance  (kubelet scrape  )
        - alert: KubeletDown
          expr: up{job="kubelet"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Kubelet Down: {{ $labels.instance }}"
            description: "kubelet {{ $labels.instance }} is not responding.  node pod   in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: ApiserverDown
          expr: up{job="apiserver"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: apiserver
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "API Server Down"
            description: "Kubernetes API Server is not responding. kubectl/ArgoCD/controller   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: CoreDNSDown
          expr: up{job="coredns"} == 0
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: coredns
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "CoreDNS Down"
            description: "CoreDNS is not responding.      ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        # observability  job Layer 4 PrometheusTargetDown
        - alert: ScrapeTargetDown
          expr: |
            up{job!~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
          for: 3m
          labels:
            severity: warning
            layer: infrastructure
            component: scrape-target
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Scrape Target Down: {{ $labels.job }}/{{ $labels.instance }}"
            description: "Prometheus {{ $labels.job }} ({{ $labels.instance }})  scrape  ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 3. Pod / Workload status
    # =========================================================================
    - name: infrastructure.workload
      rules:

        - alert: PodNotReady
          expr: |
            max by (namespace, pod) (
              kube_pod_status_ready{condition="true"} == 0
            )
            * on (namespace, pod) group_left()
            (kube_pod_status_phase{phase="Running"} == 1)
          for: 1m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Pod NotReady: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "{{ $labels.namespace }}/{{ $labels.pod }} Running Ready status ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PodCrashLoopBackOff
          expr: |
            max by (namespace, pod, container) (
              kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}
            ) == 1
          for: 1m
          labels:
            severity: critical
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "{{ $labels.namespace }}/{{ $labels.pod }}  {{ $labels.container }} CrashLoopBackOff status."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        # [FIX] spec_replicas   -
        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas
            != kube_deployment_status_replicas_available
          for: 5m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Deployment Replicas Mismatch: {{ $labels.namespace }}/{{ $labels.deployment }}"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} available replicas({{ $value }}) desired do not match."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 4. PVC / PV
    # =========================================================================
    - name: infrastructure.storage
      rules:

        # [FIX] component: kubelet - kubelet_volume_stats_* metrics
        - alert: PvcUsedHighWarning
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) > 0.8
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC Used Warning: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} usage {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PvcUsedHighCritical
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) > 0.9
          for: 5m
          labels:
            severity: critical
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC Used Critical: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }} usage {{ $value | humanizePercentage }}.     ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PvcPredictedFull
          expr: |
            predict_linear(
              kubelet_volume_stats_available_bytes[1h],
              4 * 3600
            ) < 0
          for: 10m
          labels:
            severity: warning
            layer: infrastructure
            component: kubelet
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PVC Predicted Full: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
            description: "PVC {{ $labels.persistentvolumeclaim }}  increase  4time     ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PvNotBound
          expr: kube_persistentvolume_status_phase{phase!="Bound"} == 1
          for: 5m
          labels:
            severity: warning
            layer: infrastructure
            component: kube-state-metrics
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "PV Not Bound: {{ $labels.persistentvolume }}"
            description: "PersistentVolume {{ $labels.persistentvolume }} Bound status .  status: {{ $labels.phase }}"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal
---
# Source: hp-observability-rules/templates/layer2_platform.yaml
# =============================================================================
# Layer 2 - Platform
# targets: ALB(YACE), istio-ingress, istiod, aws-load-balancer-controller, yace
#       keycloak: exporter not deployed  enabled: false
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-platform-rules
  namespace: observability
  labels:
    release: kps
    layer: platform
spec:
  groups:

    # =========================================================================
    # GROUP 1. AWS Load Balancer Controller
    # =========================================================================
    - name: platform.lbc
      rules:

        - alert: AwsLoadBalancerControllerDown
          expr: up{job="aws-load-balancer-controller-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: aws-load-balancer-controller
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "AWS Load Balancer Controller Down"
            description: "AWS Load Balancer Controller is not responding. Ingress/ALB    in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 2. ALB (YACE - aws_applicationelb_* metrics)
    # =========================================================================
    - name: platform.alb
      rules:

        - alert: AlbHigh5xxRateWarning
          expr: |
            (
              rate(aws_applicationelb_httpcode_elb_5_xx_count_sum[5m])
              /
              clamp_min(rate(aws_applicationelb_request_count_sum[5m]), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 5xx Rate Warning: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 5xx rate {{ $value | humanizePercentage }}. threshold: 1%"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: AlbHigh5xxRateCritical
          expr: |
            (
              rate(aws_applicationelb_httpcode_elb_5_xx_count_sum[5m])
              /
              clamp_min(rate(aws_applicationelb_request_count_sum[5m]), 0.001)
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB 5xx Rate Critical: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} 5xx rate {{ $value | humanizePercentage }}. Immediate action required."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: AlbHighLatencyWarning
          expr: |
            aws_applicationelb_target_response_time_p95 > 1
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB Latency Warning: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} p95 time {{ $value | humanizeDuration }}. threshold: 1s"
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: AlbHighLatencyCritical
          expr: |
            aws_applicationelb_target_response_time_p95 > 3
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: alb
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "ALB Latency Critical: {{ $labels.dimension_LoadBalancer }}"
            description: "ALB {{ $labels.dimension_LoadBalancer }} p95 time {{ $value | humanizeDuration }}. Immediate action required."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 3. Istio Ingress Gateway
    # =========================================================================
    - name: platform.istio_ingress
      rules:

        - alert: IstioIngressDown
          expr: up{job="istio-ingress-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Istio Ingress Gateway Down"
            description: "Istio Ingress Gateway is not responding.    ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: IngressHigh5xxRateWarning
          expr: |
            (
              sum(rate(istio_requests_total{
                source_workload="istio-ingressgateway",
                source_workload_namespace="istio-system",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(
                sum(rate(istio_requests_total{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])),
                0.001
              )
            ) > 0.01
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress 5xx Rate Warning"
            description: "Istio IngressGateway 5xx rate {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: IngressHigh5xxRateCritical
          expr: |
            (
              sum(rate(istio_requests_total{
                source_workload="istio-ingressgateway",
                source_workload_namespace="istio-system",
                response_code=~"5.."
              }[5m]))
              /
              clamp_min(
                sum(rate(istio_requests_total{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])),
                0.001
              )
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress 5xx Rate Critical"
            description: "Istio IngressGateway 5xx rate {{ $value | humanizePercentage }}. Immediate action required."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: IngressHighLatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])
              )
            ) / 1000 > 1
          for: 5m
          labels:
            severity: warning
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress Latency p99 Warning"
            description: "Istio IngressGateway p99  {{ $value | humanizeDuration }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: IngressHighLatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (le) (
                rate(istio_request_duration_milliseconds_bucket{
                  source_workload="istio-ingressgateway",
                  source_workload_namespace="istio-system"
                }[5m])
              )
            ) / 1000 > 3
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: istio-ingress
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Ingress Latency p99 Critical"
            description: "Istio IngressGateway p99  {{ $value | humanizeDuration }}. Immediate action required."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 4. Istiod (Control Plane)
    # =========================================================================
    - name: platform.istiod
      rules:

        - alert: IstiodDown
          expr: up{job="istiod"} == 0
          for: 1m
          labels:
            severity: critical
            layer: platform
            component: istiod
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Istiod Down"
            description: "Istiod(Istio Control Plane) is not responding.       in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 5. YACE (CloudWatch Exporter)
    # =========================================================================
    - name: platform.yace
      rules:

        # YACE down = RDS/ALB/ElastiCache CloudWatch metrics    critical
        - alert: YaceDown
          expr: up{job="yace-prometheus-yet-another-cloudwatch-exporter"} == 0
          for: 3m
          labels:
            severity: critical
            layer: platform
            component: yace
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "YACE (CloudWatch Exporter) Down"
            description: "YACE is not responding. RDS/ALB/ElastiCache CloudWatch metrics  in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 6. Keycloak - exporter not deployed,   enabled: true
    # =========================================================================
---
# Source: hp-observability-rules/templates/layer3_delivery.yaml
# =============================================================================
# Layer 3 - Delivery
# targets: Jenkins, SonarQube, ArgoCD (server/app-controller/repo-server/appset-controller)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-delivery-rules
  namespace: observability
  labels:
    release: kps
    layer: delivery
spec:
  groups:

    # =========================================================================
    # GROUP 1. Jenkins
    # =========================================================================
    - name: delivery.jenkins
      rules:

        - alert: JenkinsDown
          expr: up{job="jenkins"} == 0
          for: 1m
          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Down"
            description: "Jenkins is not responding. CI / execution ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: JenkinsBuildQueueHighWarning
          expr: |
            jenkins_queue_size_value > 10
          for: 10m
          labels:
            severity: warning
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Build Queue High: {{ $value }}"
            description: "Jenkins   {{ $value }} threshold(10) ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: JenkinsBuildQueueHighCritical
          expr: |
            jenkins_queue_size_value > 30
