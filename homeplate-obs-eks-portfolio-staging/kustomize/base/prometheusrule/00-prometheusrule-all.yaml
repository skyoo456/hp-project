            environment: prod
            team: aiops
          annotations:
            summary: "SonarQube CE Pending Tasks: {{ $value }}"
            description: "SonarQube Compute Engine pending  {{ $value }}. 15       status."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
