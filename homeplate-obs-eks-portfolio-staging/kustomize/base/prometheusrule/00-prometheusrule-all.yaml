            ) > 0.05
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Error Rate Warning: {{ $value | humanizePercentage }}"
            description: "Tempo  error rate {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
