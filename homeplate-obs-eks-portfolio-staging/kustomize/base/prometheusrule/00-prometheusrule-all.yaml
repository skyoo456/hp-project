# Source: hp-observability-rules/templates/layer7_ux.yaml
# =============================================================================
# Layer 7 - UX
# Targets: Faro RUM (hp-frontend Web Vitals / user experience)
# Metrics: faro_receiver_* (Alloy Collector faro.receiver)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-ux-rules
  namespace: observability
  labels:
    release: kps
    layer: ux
spec:
  groups:

    # =========================================================================
    # GROUP 1. Faro Receiver status
    # =========================================================================
    - name: ux.faro
      rules:

        - alert: FaroReceiverStalled
          expr: |
            (
              sum(increase(faro_receiver_events_total[30m])) > 30
            )
            and
            (
              sum(increase(faro_receiver_events_total[5m])) == 0
            )
          for: 3m
          labels:
            severity: warning
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro Receiver Stalled"
            description: "Faro RUM events were flowing in the last 30 minutes, but no events have been received in the last 5 minutes. Check Alloy Collector, ingress path, and frontend RUM SDK delivery."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: FaroExceptionRateHighWarning
          expr: |
            (
              sum(rate(faro_receiver_exceptions_total[5m]))
              /
              clamp_min(sum(rate(faro_receiver_events_total[5m])), 0.001)
            ) > 0.05
            and
            sum(rate(faro_receiver_events_total[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro Exception Rate Warning: {{ $value | humanizePercentage }}"
            description: "Frontend JavaScript exception rate is elevated while RUM traffic is present. User-side errors may be increasing."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: FaroExceptionRateHighCritical
          expr: |
            (
              sum(rate(faro_receiver_exceptions_total[5m]))
              /
              clamp_min(sum(rate(faro_receiver_events_total[5m])), 0.001)
            ) > 0.1
            and
            sum(rate(faro_receiver_events_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
            layer: ux
            component: faro-rum
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Faro Exception Rate Critical: {{ $value | humanizePercentage }}"
            description: "Frontend JavaScript exception rate is critically high while RUM traffic is present. Immediate investigation is required."
