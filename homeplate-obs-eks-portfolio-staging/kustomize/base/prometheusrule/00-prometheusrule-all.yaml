# Source: hp-observability-rules/templates/layer4_observability.yaml
# =============================================================================
# Layer 4 - Observability
# targets: Prometheus, Alertmanager, Grafana,
#       Loki (write/read/backend/gateway),
#       Tempo (distributor/ingester/querier/query-frontend/compactor),
#       Alloy collector, Alloy logs
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: layer-observability-rules
  namespace: observability
  labels:
    release: kps
    layer: observability
spec:
  groups:

    # =========================================================================
    # GROUP 1. Prometheus
    # =========================================================================
    - name: observability.prometheus
      rules:

        - alert: PrometheusDown
          expr: up{job="kps-prometheus"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Prometheus Down"
            description: "Prometheus is not responding.  metrics    in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        # ScrapeTargetDown(Layer1)  : observability  job
        - alert: PrometheusTargetDownWarning
          expr: |
            count(
              up{job=~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
            ) > 1
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Observability Target Down Warning: {{ $value }}"
            description: "observability   scrape  {{ $value }} down status."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PrometheusTargetDownCritical
          expr: |
            count(
              up{job=~"kps-prometheus|kps-alertmanager|kps-grafana|observability/.+|alloy-.+"} == 0
            ) > 5
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Observability Target Down Critical: {{ $value }}"
            description: "observability   scrape  {{ $value }} down status.    occurred."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: PrometheusConfigReloadFailed
          expr: prometheus_config_last_reload_successful == 0
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: prometheus
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Prometheus Config Reload Failed"
            description: "Prometheus    failed.      ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 2. Alertmanager
    # =========================================================================
    - name: observability.alertmanager
      rules:

        - alert: AlertmanagerDown
          expr: up{job="kps-alertmanager"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: alertmanager
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alertmanager Down"
            description: "Alertmanager is not responding.   Slack  ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: AlertmanagerConfigReloadFailed
          expr: alertmanager_config_last_reload_successful == 0
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: alertmanager
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Alertmanager Config Reload Failed"
            description: "Alertmanager   failed.      ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 3. Grafana
    # =========================================================================
    - name: observability.grafana
      rules:

        - alert: GrafanaDown
          expr: up{job="kps-grafana"} == 0
          for: 1m
          labels:
            severity: warning
            layer: observability
            component: grafana
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Grafana Down"
            description: "Grafana is not responding.   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 4. Loki
    # =========================================================================
    - name: observability.loki
      rules:

        - alert: LokiWriteDown
          expr: up{job="observability/loki-write"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Write Down"
            description: "Loki Write  is not responding.   in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: LokiReadDown
          expr: up{job="observability/loki-read"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-read
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Read Down"
            description: "Loki Read  is not responding. Grafana   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: LokiBackendDown
          expr: up{job="observability/loki-backend"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: loki-backend
            cluster: hp-eks
            environment: prod
