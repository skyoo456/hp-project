            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: JenkinsExecutorSaturationCritical
          expr: |
            (
              jenkins_executor_in_use_value
              / clamp_min(jenkins_executor_count_value, 1)
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            layer: delivery
            component: jenkins
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Jenkins Executor Saturation Critical: {{ $value | humanizePercentage }}"
            description: "Jenkins executor   status.   pending status   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
