          annotations:
            summary: "Loki Backend Down"
            description: "Loki Backend(Ruler/Compactor)  is not responding."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        # LokiGatewayDown  - job  (loki-canary/chunks-cache/results-cache  )

        - alert: LokiHighErrorRateWarning
          expr: |
            (
              sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(loki_request_duration_seconds_count[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Error Rate Warning: {{ $value | humanizePercentage }}"
            description: "Loki  error rate {{ $value | humanizePercentage }}."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: LokiHighErrorRateCritical
          expr: |
            (
              sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]))
              /
              clamp_min(sum(rate(loki_request_duration_seconds_count[5m])), 0.001)
            ) > 0.1
          for: 3m
          labels:
            severity: critical
            layer: observability
            component: loki-write
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Loki Error Rate Critical: {{ $value | humanizePercentage }}"
            description: "Loki  error rate {{ $value | humanizePercentage }}.    ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

    # =========================================================================
    # GROUP 5. Tempo
    # =========================================================================
    - name: observability.tempo
      rules:

        - alert: TempoDistributorDown
          expr: up{job="observability/distributor"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-distributor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Distributor Down"
            description: "Tempo Distributor is not responding.   in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: TempoIngesterDown
          expr: up{job="observability/ingester"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-ingester
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Ingester Down"
            description: "Tempo Ingester is not responding.    in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: TempoQuerierDown
          expr: up{job="observability/querier"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-querier
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Querier Down"
            description: "Tempo Querier is not responding. Grafana   ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: TempoQueryFrontendDown
          expr: up{job="observability/query-frontend"} == 0
          for: 1m
          labels:
            severity: critical
            layer: observability
            component: tempo-query-frontend
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Query Frontend Down"
            description: "Tempo Query Frontend is not responding.    ."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: TempoCompactorDown
          expr: up{job="observability/compactor"} == 0
          for: 3m
          labels:
            severity: warning
            layer: observability
            component: tempo-compactor
            cluster: hp-eks
            environment: prod
            team: aiops
          annotations:
            summary: "Tempo Compactor Down"
            description: "Tempo Compactor is not responding.     retention in progress."
            runbook_url: https://www.notion.so/Runbook-31055a0c436c80ecb09bf471dcf63c59
            dashboard_url: https://grafana.homeplate.internal

        - alert: TempoHighErrorRateWarning
          expr: |
            (
              sum(rate(tempo_request_duration_seconds_count{status_code=~"5.."}[5m]))
